
<% 
  feature_name = @args[0] || "dev"
  worktree_root = File.expand_path("~/src/darkwrite/#{feature_name}")
%>

name: <%= feature_name %>
root: <%= worktree_root %>


windows:
  - frontend:
      root: <%= worktree_root %>/packages/frontend
      layout: main-vertical
      panes:
        - nvim .
        - 
        -
  - common:
      root: <%= worktree_root %>/packages/common
      layout: main-vertical
      panes:
        - nvim .
        - 
        -
  - app-desktop:
      root: <%= worktree_root %>/packages/app-desktop
      layout: main-vertical
      panes:
        - nvim .
        - 
        -
  - git:
      layout: even-horizontal
      panes:
        - lazygit
        -
